# Fired when a GitHub release is published: build the package and publish it to
# PyPI via trusted publishing, then build the docs and deploy them to Pages.
name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  dist:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/jaxsne/
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build site
        run: uv run sphinx-build -M html docs out
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/html

  pages:
    name: Deploy to Pages
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write # deploy to Pages
      id-token: write # verify the deployment origin
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
